<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- squircle clip (Apple Big Sur ~ superellipse, approximated with rounded rect) -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/>
    </clipPath>

    <!-- background depth -->
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%"  stop-color="#1c1c20"/>
      <stop offset="55%" stop-color="#0e0e11"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>

    <!-- recessed pill -->
    <linearGradient id="pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#000000"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>

    <!-- the dot -->
    <radialGradient id="dot" cx="42%" cy="35%" r="75%">
      <stop offset="0%"  stop-color="#7fe3ff"/>
      <stop offset="45%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </radialGradient>

    <!-- glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00C2FF" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#0066FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0066FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- backdrop -->
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

    <!-- subtle top sheen -->
    <ellipse cx="512" cy="120" rx="620" ry="220" fill="#ffffff" opacity="0.025"/>

    <!-- glow behind dot -->
    <circle cx="512" cy="512" r="240" fill="url(#glow)"/>

    <!-- pill: recessed capsule -->
    <g>
      <rect x="252" y="430" width="520" height="164" rx="82" ry="82" fill="url(#pill)"/>
      <!-- inner shadow top edge -->
      <rect x="252" y="430" width="520" height="164" rx="82" ry="82" fill="none"
            stroke="#000000" stroke-opacity="0.7" stroke-width="3"/>
      <!-- faint highlight bottom rim -->
      <rect x="254" y="432" width="516" height="160" rx="80" ry="80" fill="none"
            stroke="#3a3a42" stroke-opacity="0.5" stroke-width="2"/>
    </g>

    <!-- the dot -->
    <circle cx="512" cy="512" r="62" fill="url(#dot)"/>
    <!-- reflective highlight -->
    <ellipse cx="494" cy="492" rx="22" ry="14" fill="#ffffff" opacity="0.85" filter="url(#softblur)"/>
  </g>
</svg>
