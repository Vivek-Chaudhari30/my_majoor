name: Majoor

options:
  bundleIdPrefix: com.majoor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Majoor:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Majoor
        excludes:
          - Info.plist
          - Majoor.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.majoor.app
        PRODUCT_NAME: Majoor
        INFOPLIST_FILE: Majoor/Info.plist
        CODE_SIGN_ENTITLEMENTS: Majoor/Majoor.entitlements
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: "27WFRH77ZP"
        COMBINE_HIDPI_IMAGES: YES
